<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Advanced To-Do List</title>

<link rel="stylesheet" href="01_style.css">

</head>

<body>

<div class="app">

<h1>To-Do List</h1>

<button id="dark-mode-btn">🌙 Dark Mode</button>

<form id="todo-form">

<input
id="todo-input"
type="text"
placeholder="Add a task">

<select id="todo-category">

<option value="Personal">Personal</option>

<option value="Study">Study</option>

<option value="Work">Work</option>

<option value="Shopping">Shopping</option>

</select>

<button type="submit">

Add

</button>

</form>

<div class="controls">

<div class="filters">

<button data-filter="all" class="active">

All

</button>

<button data-filter="active">

Active

</button>

<button data-filter="completed">

Completed

</button>

</div>

<button id="clear-completed">

Clear Completed

</button>

</div>

<ul id="todo-list"></ul>

<div id="todo-count"></div>

</div>

<script src="01_app.js"></script>

</body>

</html>
