<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Simple To-Do List</title>
  <link rel="stylesheet" href="01_style.css">
</head>
<body>
  <div class="app" role="application" aria-label="To do list app">
    <h1>To-Do List</h1>

    <form id="todo-form" aria-label="Add task">
      <input id="todo-input" type="text" placeholder="Add a new task and press Enter" autocomplete="off" />
      <button type="submit">Add</button>
    </form>

    <div class="controls">
      <div class="filters" role="tablist" aria-label="Filters">
        <button data-filter="all" class="active">All</button>
        <button data-filter="active">Active</button>
        <button data-filter="completed">Completed</button>
      </div>
      <button id="clear-completed" class="icon-btn">Clear completed</button>
    </div>

    <ul id="todo-list" aria-live="polite"></ul>
    <div class="small" id="todo-count"></div>
  </div>

  <script src="01_app.js"></script>
</body>
</html>
